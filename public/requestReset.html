<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Reset Password</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body class="newUserBackground">
        <h1>Enter your email address to receive a password reset code</h1>
        <form action="/requestReset" class="signIn" method="post">
            <input class="returningUser" type="email" id="email" name="email" placeholder="Enter your email address">
            <input id="submit" type="submit" class="newUserButton" value="Send Reset Code">
        </form>
    </body>
</html>
